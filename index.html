<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GlazierOS - Glazing Business Management</title>

  <!-- jQuery UI theme (CDN) -->
  <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css" />

  <!-- App styles -->
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="stylesheet" href="assets/css/team.css" />
  <link rel="stylesheet" href="assets/css/finance.css" />
  <link rel="stylesheet" href="assets/css/fullscreen.css" />
  <link rel="stylesheet" href="assets/css/diary/diary-modern.css" />

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }
    #gos-dashboard-app {
      width: 100vw;
      height: 100vh;
    }
    /* Loading indicator */
    #gos-loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1f2e;
      color: #fff;
      font-family: system-ui, sans-serif;
      z-index: 9999;
    }
    #gos-loading .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #4f8ef7;
      border-radius: 50%;
      animation: gos-spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    #gos-loading p {
      margin: 0;
      font-size: 14px;
      opacity: 0.7;
      letter-spacing: 0.05em;
    }
    @keyframes gos-spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <!-- Loading indicator – hidden once scripts initialise the app -->
  <div id="gos-loading">
    <div class="spinner"></div>
    <p>Loading GlazierOS&hellip;</p>
  </div>

  <!-- App mount point -->
  <div id="gos-dashboard-app"></div>

  <!-- CDN dependencies -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"
          integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
          crossorigin="anonymous"></script>
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"
          integrity="sha256-lSjKY0/srUM9BE3dPm+c4fBo1dky2v27Gdjm2uoZaL0="
          crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"
          crossorigin="anonymous"></script>

  <!-- DataStore MUST load first – replaces all WP REST calls -->
  <script src="assets/js/DataStore.js"></script>

  <!-- 3-D preview builders -->
  <script src="assets/js/builders/TestWindow.js"></script>
  <script src="assets/js/builders/TestDoor.js"></script>

  <!-- Dashboard modules -->
  <script src="assets/js/dashboard/dashboard-app.js"></script>
  <script src="assets/js/dashboard/quotes-v2.js"></script>
  <script src="assets/js/dashboard/diary-v2.js"></script>
  <script src="assets/js/dashboard/diary-v2-rendering.js"></script>
  <script src="assets/js/dashboard/diary-v2-views.js"></script>
  <script src="assets/js/dashboard/diary-v2-events.js"></script>
  <script src="assets/js/dashboard/diary-v2-modal.js"></script>
  <script src="assets/js/dashboard/diary-v2-init.js"></script>
  <script src="assets/js/dashboard/team.js"></script>
  <script src="assets/js/dashboard/settings.js"></script>
  <script src="assets/js/dashboard/finance.js"></script>
  <script src="assets/js/dashboard/finance-init.js"></script>
  <script src="assets/js/dashboard/reports.js"></script>
  <script src="assets/js/dashboard/audit-logs.js"></script>
  <script src="assets/js/dashboard/branches.js"></script>
  <script src="assets/js/dashboard/quote-detail.js"></script>

</body>
</html>
